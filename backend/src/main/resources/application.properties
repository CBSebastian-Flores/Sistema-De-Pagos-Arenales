# NOMBRE DE LA APLICACION
spring.application.name=SistemaPagosArenales

# URL DEL PROYECTO
server.servlet.context-path=/sistemapagoarenales

# CONEXION A SQL SERVER
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=CC_Arenales;encrypt=true;trustServerCertificate=true

# USUARIOS BD
#spring.datasource.username=sa_cca
spring.datasource.username=sa

# USUARIOS CALVES
#spring.datasource.password=Hollowmeow_
spring.datasource.password=@123remo123@

#DRIVER
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

#Fuerza a Hibernate a usar los nombres exactos de las anotaciones @Column
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect